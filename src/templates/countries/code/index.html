<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="content-type" content="application/xhtml+xml; charset=UTF-8" />
<link href="{{root}}/img/fav-logo.ico" rel="shortcut icon" type="image/x-icon" />
<link href="{{root}}/css/design.css" rel="stylesheet" type="text/css" />
<link href="{{root}}/css/print.css" rel="stylesheet" type="text/css" media="print" />
<title>IPhO: ${country}</title>
</head>
<body>
${header_side}
<div id="main">
  <div class="flag">
    <a href="${index}">
    <img title="${country}" src="{{root}}/img/flags/${code}.gif" alt="${country}" style="border-width:0px;" />
    </a>
  </div>
  <h2>
  <a href="../${previous_code}/${index}" class="pointer" style="${previous_code_style}">&#9668;</a>
  <a href="${index}" class="highlight">${country}</a>
  <a href="../${next_code}/${index}" class="pointer" style="${next_code_style}">&#9658;</a>
  </h2>
  <h3 class="hideprn">
  <a href="individual${html_ext}">Individual results</a>
  </h3>
  <dl class="normal">
  <div style="${contact_style}">
    <dt>Contact</dt>
    <dd>National PhO site: <a href="${national_site}" target="_blank">${national_site_text}</a></dd>
  </div>
  ${host}
  <dt>Performance at the IPhO</dt>
  <dd>Gold medals: ${gold}<br>Silver medals: ${silver}<br>Bronze medals: ${bronze}<br>Honourable mentions: ${honourable}</dd>
  </dl>
</div>
${footer}
</body>
</html>
