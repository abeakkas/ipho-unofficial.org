<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="content-type" content="application/xhtml+xml; charset=UTF-8" />
<link href="${root}/img/fav-logo.ico" rel="shortcut icon" type="image/x-icon" />
<link href="${root}/css/design.css" rel="stylesheet" type="text/css" />
<link href="${root}/css/print.css" rel="stylesheet" type="text/css" media="print" />
<title>IPhO: ${country} - Individual Results</title>
</head>
<body>
${header_side}
<div id="main">
  <div class="flag hideprn">
    <a href="${index}">
    <img title="${country}" src="${root}/img/flags/${code}.gif" alt="${country}" style="border-width:0px;" />
    </a>
  </div>
  <h2>
  <a href="../${previous_code}/individual${html_ext}" class="pointer" style="${previous_code_style}">&#9668;</a>
  <a href="${index}">${country}</a>
  <a href="../${next_code}/individual${html_ext}" class="pointer" style="${next_code_style}">&#9658;</a>
  </h2>
  <h3>
  <a class="highlight" href="individual${html_ext}">Individual results</a>
  </h3>
  <table>
  <thead>
  <tr><th class="highlightDown">Year</th><th>Contestant</th><th>Rank</th><th>Award</th></tr>
  </thead>
  <tbody>
  ${table}
  </tbody>
  </table>
  <div>
    Results may be incomplete or incorrect.
    Please send the relevant information to the webmaster:
    <a href="mailto:${webmaster}">${webmaster}</a>.
    <br>
    If you are a participant you can send a personal page URL to be attached
    to your name.
  </div>
</div>
${footer}
</body>
</html>
